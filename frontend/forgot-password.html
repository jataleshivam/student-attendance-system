<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Forgot Password - Student Attendance System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h2>Forgot Password?</h2>
        <p>Enter your email to receive a reset OTP</p>
      </div>

      <div id="message" class="message"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="admin@gmail.com" required>
          </div>
        </div>

        <button type="submit" class="btn" id="forgotBtn">Send Reset OTP</button>
      </form>

      <div class="auth-footer">
        <p><a href="/login.html">← Back to Login</a></p>
      </div>
    </div>
  </div>

  <script src="/js/script.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('forgotBtn');
      const msg = document.getElementById('message');

      if (!email.endsWith('@gmail.com')) {
        showMessage(msg, 'Only Gmail accounts are allowed.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending OTP...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        sessionStorage.setItem('resetEmail', email);
        showMessage(msg, data.message, 'success');
        setTimeout(() => window.location.href = '/reset-password.html', 1500);
      } catch (err) {
        showMessage(msg, 'Connection error.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset OTP';
      }
    });
  </script>
</body>
</html>
