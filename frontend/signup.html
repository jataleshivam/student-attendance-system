<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Sign Up - Student Attendance System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Register as an admin to manage attendance</p>
      </div>

      <div id="message" class="message"></div>

      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="Enter username" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email (Gmail Only)</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="youremail@gmail.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
            <button type="button" class="password-toggle" onclick="togglePassword('password')"></button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')"></button>
          </div>
        </div>

        <button type="submit" class="btn" id="signupBtn">Create Account</button>

        <div class="auth-footer">
          <p>Already have an account? <a href="/login.html">Sign In</a></p>
        </div>
      </form>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Creating account...</p>
      </div>
    </div>
  </div>

  <script src="/js/script.js"></script>
  <script>
    if (sessionStorage.getItem('token')) {
      window.location.replace('/dashboard.html');
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('signupBtn');
      const msg = document.getElementById('message');

      if (!email.endsWith('@gmail.com')) {
        showMessage(msg, 'Only Gmail accounts (@gmail.com) are allowed.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMessage(msg, 'Passwords do not match.', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage(msg, 'Password must be at least 6 characters.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating Account...';
      document.getElementById('loading').classList.add('show');

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, confirmPassword })
        });
        const data = await res.json();

        if (data.success) {
          showMessage(msg, data.message, 'success');
          setTimeout(() => window.location.replace('/login.html'), 1500);
        } else {
          showMessage(msg, data.message, 'error');
        }
      } catch (err) {
        showMessage(msg, 'Connection error. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
        document.getElementById('loading').classList.remove('show');
      }
    });
  </script>
</body>
</html>
