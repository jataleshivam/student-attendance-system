<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>View Students - Student Attendance System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-text"><h3>Attendance</h3><p>Admin Panel</p></div>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item">Dashboard</a>
        <a href="/add-student.html" class="nav-item">Add Student</a>
        <a href="/view-students.html" class="nav-item active">View Students</a>
        <div class="nav-divider"></div>
        <a href="/mark-attendance.html" class="nav-item">Manual Attendance</a>
        <a href="/face-attendance.html" class="nav-item">Face Attendance</a>
        <a href="/view-attendance.html" class="nav-item">View Attendance</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" class="nav-item logout" onclick="logout()">Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
          <div class="header-title"><h2>All Students</h2><p>Manage registered students</p></div>
        </div>
        <div class="header-user">
          <div class="user-avatar" id="userAvatar">A</div>
        </div>
      </header>

      <div class="content-area">
        <div class="table-container">
          <div class="table-header">
            <h3>Students List (<span id="studentCount">0</span>)</h3>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>#</th><th>Name</th><th>Roll Number</th><th>Department</th><th>Email</th><th>Action</th>
                </tr>
              </thead>
              <tbody id="studentsTableBody">
                <tr><td colspan="6" class="empty-state"><h3>Loading...</h3></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/script.js"></script>
  <script>
    requireAuth();
    initSessionTimeout();
    loadStudents();

    async function loadStudents() {
      try {
        const res = await authFetch('/api/students/all');
        const data = await res.json();
        const tbody = document.getElementById('studentsTableBody');
        document.getElementById('studentCount').textContent = data.data.length;

        if (!data.data || data.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><h3>No students found</h3><p>Add students to get started</p></div></td></tr>';
          return;
        }

        tbody.innerHTML = data.data.map((s, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${s.name}</td>
            <td><strong>${s.roll_no}</strong></td>
            <td>${s.department}</td>
            <td>${s.email || '-'}</td>
            <td>
              <button class="action-btn delete" onclick="deleteStudent('${s.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    async function deleteStudent(id) {
      if (!confirm('Are you sure you want to delete this student?')) return;
      try {
        const res = await authFetch('/api/students/' + id, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) { showToast('Student deleted!', 'success'); loadStudents(); }
        else showToast(data.message, 'error');
      } catch (err) {
        showToast('Error deleting student.', 'error');
      }
    }
  </script>
</body>
</html>
