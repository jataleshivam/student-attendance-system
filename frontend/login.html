<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Login - Student Attendance System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h2>Welcome Back!</h2>
        <p>Sign in to your admin account</p>
      </div>

      <div id="message" class="message"></div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="loginEmail" placeholder="admin@gmail.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrapper">
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')"></button>
          </div>
        </div>

        <button type="submit" class="btn" id="loginBtn">Sign In</button>

        <div class="auth-footer">
          <p><a href="/forgot-password.html">Forgot Password?</a></p>
          <p style="margin-top:10px">Don't have an account? <a href="/signup.html">Create Account</a></p>
        </div>
      </form>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Authenticating...</p>
      </div>
    </div>
  </div>

  <script src="/js/script.js"></script>
  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem('token')) {
      window.location.replace('/dashboard.html');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('message');

      if (!email.endsWith('@gmail.com')) {
        showMessage(msg, 'Only Gmail accounts are allowed.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing In...';
      document.getElementById('loading').classList.add('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem('token', data.token);
          sessionStorage.setItem('user', JSON.stringify(data.user));
          showMessage(msg, data.message, 'success');
          setTimeout(() => window.location.replace('/dashboard.html'), 1000);
        } else {
          showMessage(msg, data.message, 'error');
        }
      } catch (err) {
        showMessage(msg, 'Connection error. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
        document.getElementById('loading').classList.remove('show');
      }
    });
  </script>
</body>

</html>
