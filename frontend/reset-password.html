<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Reset Password - Student Attendance System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h2>Reset Password</h2>
        <p>Enter the OTP and your new password</p>
        <p style="color:var(--accent-primary);font-size:13px;margin-top:8px" id="emailDisplay"></p>
      </div>

      <div id="message" class="message"></div>

      <form id="resetForm">
        <div class="otp-inputs" id="otpInputs">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-wrapper">
            <input type="password" id="newPassword" placeholder="Min 6 characters" required minlength="6">
            <button type="button" class="password-toggle" onclick="togglePassword('newPassword')"></button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
          </div>
        </div>

        <button type="submit" class="btn" id="resetBtn">Reset Password</button>
      </form>

      <div class="auth-footer">
        <p><a href="/login.html">← Back to Login</a></p>
      </div>
    </div>
  </div>

  <script src="/js/script.js"></script>
  <script>
    const email = sessionStorage.getItem('resetEmail');
    if (!email) window.location.href = '/forgot-password.html';
    document.getElementById('emailDisplay').textContent = email;

    setupOTPInputs('otpInputs');

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const otp = getOTPValue('otpInputs');
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('resetBtn');
      const msg = document.getElementById('message');

      if (otp.length !== 6) {
        showMessage(msg, 'Please enter the complete OTP.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage(msg, 'Passwords do not match.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp, newPassword, confirmPassword })
        });
        const data = await res.json();

        if (data.success) {
          showMessage(msg, data.message, 'success');
          sessionStorage.removeItem('resetEmail');
          setTimeout(() => window.location.replace('/login.html'), 1500);
        } else {
          showMessage(msg, data.message, 'error');
        }
      } catch (err) {
        showMessage(msg, 'Connection error.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
